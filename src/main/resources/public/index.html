<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Head Office Live Sales Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg-0: #070b14;
        --bg-1: #101a2b;
        --panel: rgba(14, 22, 37, 0.84);
        --panel-border: rgba(122, 151, 201, 0.2);
        --text-main: #f3f7ff;
        --text-muted: #9fb2d0;
        --accent: #41c7ff;
        --accent-soft: rgba(65, 199, 255, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(
            1200px 700px at 8% 10%,
            rgba(65, 199, 255, 0.18),
            transparent 60%
          ),
          radial-gradient(
            1000px 650px at 90% 90%,
            rgba(137, 255, 210, 0.12),
            transparent 60%
          ),
          linear-gradient(165deg, var(--bg-0), var(--bg-1));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .dashboard {
        width: min(980px, 100%);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        backdrop-filter: blur(9px);
        box-shadow: 0 28px 60px rgba(0, 0, 0, 0.42);
        padding: 28px 24px;
        animation: reveal 0.75s ease-out both;
      }

      h1 {
        margin: 0 0 6px;
        text-align: center;
        letter-spacing: 0.5px;
        font-weight: 700;
        font-size: clamp(1.4rem, 2.9vw, 2.2rem);
      }

      .subtext {
        margin: 0 0 20px;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .chart-wrap {
        position: relative;
        height: min(58vh, 460px);
        background: linear-gradient(
          180deg,
          rgba(9, 18, 31, 0.86),
          rgba(8, 14, 24, 0.7)
        );
        border: 1px solid rgba(110, 145, 194, 0.2);
        border-radius: 14px;
        padding: 14px;
      }

      .status {
        margin-top: 14px;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .status strong {
        color: var(--accent);
        font-weight: 600;
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 640px) {
        .dashboard {
          padding: 20px 14px;
        }

        .chart-wrap {
          height: 52vh;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="dashboard">
      <header>
        <h1>Head Office Live Sales Analytics</h1>
        <p class="subtext">Live totals from synchronized regional sales</p>
      </header>

      <section class="chart-wrap">
        <canvas
          id="salesChart"
          aria-label="Bar chart of total sales by region"
        ></canvas>
      </section>

      <p class="status">
        Last updated: <strong id="lastUpdated">Waiting for data...</strong>
      </p>
    </main>

    <script>
      const chartCanvas = document.getElementById("salesChart");
      const lastUpdatedNode = document.getElementById("lastUpdated");

      const salesChart = new Chart(chartCanvas, {
        type: "bar",
        data: {
          labels: [],
          datasets: [
            {
              label: "Total Sales",
              data: [],
              borderWidth: 1,
              borderRadius: 8,
              backgroundColor: [
                "rgba(65, 199, 255, 0.9)",
                "rgba(86, 255, 186, 0.85)",
                "rgba(255, 197, 91, 0.85)",
                "rgba(255, 121, 121, 0.85)",
                "rgba(160, 146, 255, 0.85)",
                "rgba(255, 123, 188, 0.85)",
              ],
              borderColor: "rgba(255, 255, 255, 0.14)",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 550,
            easing: "easeOutCubic",
          },
          plugins: {
            legend: {
              labels: {
                color: "#f3f7ff",
              },
            },
          },
          scales: {
            x: {
              ticks: {
                color: "#d7e3f7",
              },
              grid: {
                color: "rgba(140, 170, 214, 0.15)",
              },
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: "#d7e3f7",
              },
              grid: {
                color: "rgba(140, 170, 214, 0.15)",
              },
            },
          },
        },
      });

      async function refreshSalesChart() {
        try {
          const response = await fetch("/api/sales", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const salesRows = await response.json();
          salesChart.data.labels = salesRows.map((row) => row.region);
          salesChart.data.datasets[0].data = salesRows.map((row) =>
            Number(row.total_sales ?? 0),
          );
          salesChart.update();

          lastUpdatedNode.textContent = new Date().toLocaleTimeString();
        } catch (error) {
          console.error("Failed to refresh sales chart", error);
          lastUpdatedNode.textContent = "Connection issue - retrying...";
        }
      }

      refreshSalesChart();
      setInterval(refreshSalesChart, 2000);
    </script>
  </body>
</html>
